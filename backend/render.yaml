services:
  - type: web
    name: smart-supply-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DARAJA_CONSUMER_KEY
        sync: false
      - key: DARAJA_CONSUMER_SECRET
        sync: false
      - key: DARAJA_SHORTCODE
        sync: false
      - key: DARAJA_PASSKEY
        sync: false
      - key: DARAJA_CALLBACK_URL
        sync: false
      - key: FCM_SERVER_KEY
        sync: false
      - key: PYTHON_API_BASE_URL
        sync: false
